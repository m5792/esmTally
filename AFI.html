<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pi Visual Demo</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: #fff;
  }

  canvas {
    background: #222;
    margin-top: 20px;
    border-radius: 10px;
  }

  input {
    padding: 8px;
    margin-top: 15px;
    width: 100px;
    text-align: center;
  }

  .box {
    margin-top: 15px;
    font-size: 18px;
  }
</style>
</head>
<body>

<h2>🔵 Pi (π) Visual Demo</h2>

<label>Radius (r): </label>
<input type="number" id="radius" value="50" min="10" max="150">

<canvas id="circleCanvas" width="400" height="300"></canvas>

<div class="box">
  Diameter = <span id="diameter"></span>
</div>

<div class="box">
  Circumference = <span id="circumference"></span>
</div>

<div class="box">
  π (C ÷ D) = <span id="piValue"></span>
</div>

<script>
const canvas = document.getElementById("circleCanvas");
const ctx = canvas.getContext("2d");

const radiusInput = document.getElementById("radius");

function drawCircle(r) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(150, 150, r, 0, 2 * Math.PI);
  ctx.strokeStyle = "cyan";
  ctx.lineWidth = 3;
  ctx.stroke();

  // Diameter line
  ctx.beginPath();
  ctx.moveTo(150 - r, 150);
  ctx.lineTo(150 + r, 150);
  ctx.strokeStyle = "yellow";
  ctx.lineWidth = 2;
  ctx.stroke();
}

function updateValues() {
  const r = parseFloat(radiusInput.value);

  const diameter = 2 * r;
  const circumference = 2 * Math.PI * r;
  const pi = circumference / diameter;

  document.getElementById("diameter").innerText = diameter.toFixed(2);
  document.getElementById("circumference").innerText = circumference.toFixed(2);
  document.getElementById("piValue").innerText = pi.toFixed(50);

  drawCircle(r);
}

radiusInput.addEventListener("input", updateValues);

// Initial run
updateValues();
</script>

</body>
</html>















<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universe Number Matcher</title>
<style>
  body {
    font-family: Arial;
    background: #0b0f1a;
    color: #fff;
    text-align: center;
    padding: 20px;
  }

  input {
    padding: 10px;
    width: 300px;
    border-radius: 8px;
    border: none;
    text-align: center;
    font-size: 16px;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: cyan;
    font-weight: bold;
    cursor: pointer;
  }

  .result {
    margin-top: 20px;
    text-align: left;
    background: #111827;
    padding: 15px;
    border-radius: 10px;
  }

  .match {
    color: lightgreen;
  }

  .no-match {
    color: red;
  }
</style>
</head>
<body>

<h2>🌌 Universe Number Matcher</h2>

<input type="text" id="userNumber" value="14159265358979">

<br>
<button onclick="compare()">Compare</button>

<div class="result" id="result"></div>

<script>
function compare() {
  const num = parseFloat(document.getElementById("userNumber").value);
  const resultBox = document.getElementById("result");

  if (!num) {
    resultBox.innerHTML = "❌ Enter valid number";
    return;
  }

  const constants = [
    { name: "Speed of Light (m/s)", value: 299792458 },
    { name: "Earth-Sun Distance (km)", value: 149600000 },
    { name: "Earth Radius (km)", value: 6371 },
    { name: "Gravitational Constant (G)", value: 6.67430e-11 },
    { name: "Planck Constant", value: 6.62607015e-34 },
    { name: "Avogadro Number", value: 6.02214076e23 }
  ];

  let html = "";

  constants.forEach(c => {
    let ratio = num / c.value;
    let diff = Math.abs(num - c.value);

    html += `
      <div>
        <b>${c.name}</b><br>
        Value: ${c.value}<br>
        Difference: ${diff.toExponential(3)}<br>
        Ratio: ${ratio.toExponential(3)}<br>
        <hr>
      </div>
    `;
  });

  // Pi check
  let pi = Math.PI;
  let userScaled = num / Math.pow(10, Math.floor(Math.log10(num)));

  html += `
    <div class="match">
      <b>π (Pi) Relation Check</b><br>
      Normalized Value: ${userScaled.toFixed(10)}<br>
      π Value: ${pi.toFixed(10)}<br>
    </div>
  `;

  resultBox.innerHTML = html;
}
</script>

</body>
</html>





<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>369 Magic Pattern</title>
<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
  }

  input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    text-align: center;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    border-radius: 8px;
    background: cyan;
    border: none;
    cursor: pointer;
  }

  .result {
    margin-top: 20px;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
  }

  .magic {
    color: lightgreen;
    font-size: 20px;
  }
</style>
</head>
<body>

<h2>🔮 3-6-9 Magic Number Tool</h2>

<input type="text" id="numInput" placeholder="Enter any number">

<br>
<button onclick="startMagic()">Check Magic</button>

<div class="result" id="output"></div>

<script>
function digitalRootSteps(n) {
  let steps = [];
  
  while (n.length > 1) {
    let sum = 0;
    for (let digit of n) {
      sum += parseInt(digit);
    }
    steps.push(n + " → " + sum);
    n = sum.toString();
  }

  return { final: parseInt(n), steps };
}

function startMagic() {
  let input = document.getElementById("numInput").value.trim();
  let output = document.getElementById("output");

  if (!input || isNaN(input)) {
    output.innerHTML = "❌ Enter valid number";
    return;
  }

  let result = digitalRootSteps(input);

  let html = "<b>Steps:</b><br>";
  result.steps.forEach(s => {
    html += s + "<br>";
  });

  html += "<br><b>Final Number:</b> " + result.final;

  if ([3,6,9].includes(result.final)) {
    html += "<div class='magic'>✨ MAGIC 3-6-9 DETECTED</div>";
  } else {
    html += "<div>Normal Number</div>";
  }

  output.innerHTML = html;
}
</script>

</body>
</html>
